name: Windows 빌드

on:
  push:
    branches: [main]
  workflow_dispatch:   # GitHub Actions 탭에서 수동 실행 버튼

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: pnpm 설치
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Node.js 설치
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: 패키지 설치
        run: pnpm install

      - name: Native 모듈 Electron용 재빌드
        run: npx electron-builder install-app-deps

      - name: .env 파일 생성 (Supabase 키)
        shell: bash
        run: |
          echo "VITE_SUPABASE_URL=https://fcaoakdlbecamoyeqyha.supabase.co" >> .env
          echo "VITE_SUPABASE_ANON=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZjYW9ha2RsYmVjYW1veWVxeWhhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEyMTY1OTYsImV4cCI6MjA5Njc5MjU5Nn0.FlHwYKyddPR_ufi-vCOBFWzgSKE-_xsgGjypV6JVLpY" >> .env

      - name: 빌드 (electron-vite)
        run: pnpm build

      - name: Windows 패키징 — x64
        run: pnpm dist --win --x64 --publish never

      - name: 설치파일 업로드 (Artifacts)
        uses: actions/upload-artifact@v4
        with:
          name: 샐러리아-POS-Windows-x64
          path: |
            dist/**/*.exe
            dist/*.exe
          if-no-files-found: error
          retention-days: 30
